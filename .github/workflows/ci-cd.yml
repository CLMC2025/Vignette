# =====================================================
# GitHub Actions CI/CD 工作流
# 用于 HarmonyOS NEXT 项目的自动化构建和测试
# =====================================================
# 注意：由于 HarmonyOS 构建需要 DevEco Studio 环境，
# 此工作流主要用于代码质量检查和静态分析。
# 完整构建需要在本地或自托管 Runner 上进行。
# =====================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'screenshots/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # 允许手动触发

# 环境变量
env:
  NODE_VERSION: '18'
  OHMOS_VERSION: '11'

jobs:
  # =====================================================
  # 1. 代码质量检查
  # =====================================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装依赖
        run: npm ci

      - name: 运行 ArkTS 代码检查
        run: npm run lint
        continue-on-error: true

      - name: 检查 TypeScript 类型安全
        run: |
          npx tsc --noEmit --skipLibCheck
        continue-on-error: true

      - name: 检查代码规范
        run: |
          echo "检查代码规范..."
          # 检查文件末尾是否有换行
          find entry/src/main/ets -name "*.ets" -type f | while read file; do
            if [ -n "$(tail -c 1 "$file")" ]; then
              echo "⚠️ 警告：$file 文件末尾缺少换行符"
            fi
          done

      - name: 检查敏感信息泄露
        run: |
          echo "扫描敏感信息..."
          if grep -r "api_key\s*=\s*['\"][^'\"]*['\"]" --include="*.ets" --include="*.ts" --include="*.js" . 2>/dev/null; then
            echo "❌ 发现硬编码的 API 密钥！"
            exit 1
          fi
          if grep -r "password\s*:\s*['\"][^'\"]*['\"]" --include="*.ets" --include="*.ts" --include="*.js" . 2>/dev/null | grep -v "test\|mock"; then
            echo "❌ 发现硬编码的密码！"
            exit 1
          fi
          echo "✅ 未发现敏感信息泄露"

      - name: 检查 TODO 注释
        run: |
          echo "统计 TODO 注释..."
          grep -r "TODO" --include="*.ets" --include="*.ts" entry/src/main/ets | wc -l || true

  # =====================================================
  # 2. 代码统计
  # =====================================================
  code-stats:
    name: Code Statistics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 统计代码行数
        run: |
          echo "## 代码统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 统计 .ets 和 .ts 文件
          ETS_FILES=$(find entry/src/main/ets -name "*.ets" | wc -l)
          TS_FILES=$(find entry/src/main/ets -name "*.ts" | wc -l)
          ETS_LINES=$(find entry/src/main/ets -name "*.ets" -exec cat {} \; | wc -l)
          TS_LINES=$(find entry/src/main/ets -name "*.ts" -exec cat {} \; | wc -l)
          
          echo "| 类型 | 文件数 | 行数 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| .ets | $ETS_FILES | $ETS_LINES |" >> $GITHUB_STEP_SUMMARY
          echo "| .ts  | $TS_FILES | $TS_LINES |" >> $GITHUB_STEP_SUMMARY
          echo "| **总计** | **$((ETS_FILES + TS_FILES))** | **$((ETS_LINES + TS_LINES))** |" >> $GITHUB_STEP_SUMMARY

      - name: 检查测试覆盖率
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 测试文件" >> $GITHUB_STEP_SUMMARY
          TEST_FILES=$(find entry/src/test entry/src/ohosTest -name "*.test.ets" 2>/dev/null | wc -l)
          echo "测试文件数量：$TEST_FILES" >> $GITHUB_STEP_SUMMARY

  # =====================================================
  # 3. 文档检查
  # =====================================================
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查必需文档
        run: |
          echo "检查文档完整性..."
          
          REQUIRED_FILES=(
            "README.md"
            "CONTRIBUTING.md"
            "LICENSE"
          )
          
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ 缺少必需文件：$file"
              exit 1
            fi
          done
          
          echo "✅ 所有必需文档都存在"

      - name: 检查 README 质量
        run: |
          if [ -f "README.md" ]; then
            WORD_COUNT=$(wc -w < README.md)
            if [ "$WORD_COUNT" -lt 100 ]; then
              echo "⚠️ 警告：README.md 内容过少 ($WORD_COUNT 字)"
            else
              echo "✅ README.md 内容充足 ($WORD_COUNT 字)"
            fi
          fi

  # =====================================================
  # 4. 依赖检查
  # =====================================================
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装依赖
        run: npm ci

      - name: 检查过时的依赖
        run: npm outdated || true

      - name: 检查安全漏洞
        run: npm audit --audit-level=moderate || true

      - name: 验证 oh-package.json5
        run: |
          if [ -f "oh-package.json5" ]; then
            echo "✅ oh-package.json5 存在"
            # 可以在这里添加更多验证逻辑
          else
            echo "❌ 缺少 oh-package.json5"
            exit 1
          fi

  # =====================================================
  # 5. 构建检查（仅验证配置）
  # =====================================================
  build-verify:
    name: Build Configuration Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 验证构建配置文件
        run: |
          echo "检查构建配置文件..."
          
          if [ -f "build-profile.json5" ]; then
            echo "⚠️ 警告：build-profile.json5 不应提交到仓库"
          fi
          
          if [ -f "build-profile.json5.template" ]; then
            echo "✅ build-profile.json5.template 存在"
          else
            echo "❌ 缺少 build-profile.json5.template"
          fi

          if [ -f "hvigorfile.ts" ]; then
            echo "✅ hvigorfile.ts 存在"
          else
            echo "❌ 缺少 hvigorfile.ts"
            exit 1
          fi

      - name: 验证模块配置
        run: |
          if [ -f "entry/src/main/module.json5" ]; then
            echo "✅ module.json5 存在"
          else
            echo "❌ 缺少 module.json5"
            exit 1
          fi

  # =====================================================
  # 6. 发布到 GitHub Releases（仅 main 分支）
  # =====================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [code-quality, code-stats, docs-check, dependency-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取版本号
        id: get_version
        run: |
          if [ -f "oh-package.json5" ]; then
            VERSION=$(grep -o '"version": "[^"]*"' oh-package.json5 | cut -d'"' -f4)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: 生成变更日志
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release v${{ steps.get_version.outputs.version }}
          body: |
            ## 更新内容
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## 安装说明
            
            1. 下载最新的 .app 或 .hap 文件
            2. 使用 DevEco Studio 安装到设备
            3. 或参考 README.md 获取详细说明
            
            ## 注意事项
            
            - 需要 HarmonyOS NEXT 系统
            - 首次安装需要配置签名证书
          draft: true
          prerelease: false

# =====================================================
# 工作流状态通知（可选）
# =====================================================
notify:
  name: Notify Status
  runs-on: ubuntu-latest
  needs: [code-quality, code-stats, docs-check, dependency-check, release]
  if: always()
  timeout-minutes: 5

  steps:
    - name: 输出工作流状态
      run: |
        echo "工作流执行完成"
        echo "状态：${{ needs.code-quality.result }} / ${{ needs.docs-check.result }}"
